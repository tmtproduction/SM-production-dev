<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8fafc; font-family: 'Sarabun', sans-serif; }
    .card-custom { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .big-input { height: 60px; font-size: 1.5rem; text-align: center; font-weight: bold; border: 2px solid #e2e8f0; }
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2 fw-bold">กำลังประมวลผล...</div>
  </div>

  <div class="container py-4" style="max-width: 600px;">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="fw-bold text-primary m-0">Tube Production</h3>
        <p class="text-muted small m-0">บันทึกคุณภาพงานผลิตท่อ/ตัวซี</p>
      </div>
      <i class="fa-solid fa-pipe-section fa-2x text-primary"></i>
    </div>

    <!-- 1. เลือกม้วนสลิต -->
    <div class="card-custom p-4 mb-3 border-top border-4 border-primary">
      <label class="fw-bold mb-2">1. เลือกม้วนสลิต (Input Material)</label>
      <select id="slit-select" class="form-select form-select-lg" onchange="loadSlitDetail()">
        <option value="">-- กำลังโหลดรายการม้วนสลิต --</option>
      </select>
      <div id="slit-detail" class="mt-3 p-3 bg-light rounded" style="display:none;">
        <div class="row text-center">
          <div class="col-6">หนาสลิต: <b id="ref-thk">-</b> mm</div>
          <div class="col-6">น้ำหนัก: <b id="ref-weight">-</b> kg</div>
        </div>
      </div>
    </div>

    <!-- 2. บันทึกมัด -->
    <div id="bundle-input-area" style="display:none;">
      <div class="card-custom p-4 mb-3">
        <label class="fw-bold mb-3">2. บันทึกรายมัด (Bundle Tracking)</label>
        <div class="row g-3">
          <div class="col-12">
            <small class="text-muted">น้ำหนักมัด (kg)</small>
            <input type="number" id="b-weight" class="form-control big-input" placeholder="0">
          </div>
          <div class="col-12">
            <small class="text-muted">หนา (วัดฝั่งตรงข้ามตะเข็บ)</small>
            <input type="number" step="0.001" id="b-thk" class="form-control big-input" placeholder="0.000">
          </div>
        </div>
        <button onclick="addBundle()" class="btn btn-primary w-100 mt-4 py-3 fw-bold fs-5">
          <i class="fa-solid fa-plus me-2"></i> บันทึกมัดนี้ (Add Bundle)
        </button>
      </div>

      <!-- รายการมัด -->
      <div id="bundle-list" class="mb-4"></div>

      <!-- ปุ่มจบงาน -->
      <button onclick="finishSlit()" class="btn btn-success w-100 py-3 fw-bold shadow">
        <i class="fa-solid fa-check-double me-2"></i> จบม้วนสลิตนี้ (Finish & Update Inventory)
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    let bundles = [];
    let slitInfo = null;

    window.onload = () => {
      document.getElementById('loading').style.display = 'flex';
      google.script.run.withSuccessHandler(slits => {
        const sel = document.getElementById('slit-select');
        sel.innerHTML = '<option value="">-- เลือกม้วนสลิต --</option>';
        slits.forEach(s => {
          let opt = new Option(`${s.slitId} (${s.thkC}mm)`, s.slitId);
          opt.dataset.thk = s.thkC;
          opt.dataset.weight = s.weight;
          sel.add(opt);
        });
        document.getElementById('loading').style.display = 'none';
      }).getAvailableSlitsForTube();
    };

    function loadSlitDetail() {
      const sel = document.getElementById('slit-select');
      const opt = sel.options[sel.selectedIndex];
      if(!opt.value) return;

      slitInfo = { id: opt.value, thk: opt.dataset.thk, weight: opt.dataset.weight };
      document.getElementById('ref-thk').innerText = slitInfo.thk;
      document.getElementById('ref-weight').innerText = Number(slitInfo.weight).toLocaleString();
      document.getElementById('slit-detail').style.display = 'block';
      document.getElementById('bundle-input-area').style.display = 'block';
    }

    function addBundle() {
      const weight = document.getElementById('b-weight').value;
      const thk = document.getElementById('b-thk').value;
      
      if(!weight || !thk) return Swal.fire("ลืมกรอกข้อมูล", "กรุณาใส่ทั้งน้ำหนักและความหนา", "warning");

      bundles.push({
        bundleNo: bundles.length + 1,
        weight: Number(weight),
        thickness: Number(thk),
        status: (Math.abs(thk - slitInfo.thk) <= 0.05) ? "PASS" : "FAIL"
      });

      renderTable();
      document.getElementById('b-weight').value = '';
      document.getElementById('b-thk').value = '';
    }

    function renderTable() {
      const list = document.getElementById('bundle-list');
      let html = '<ul class="list-group shadow-sm">';
      bundles.forEach((b, i) => {
        html += `
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <b>มัดที่ ${b.bundleNo}</b> | ${b.weight} kg | หนา: ${b.thickness}
            <span class="badge ${b.status==='PASS'?'bg-success':'bg-danger'}">${b.status}</span>
          </li>`;
      });
      html += '</ul>';
      list.innerHTML = html;
    }

    function finishSlit() {
      if(bundles.length === 0) return Swal.fire("ไม่มีข้อมูล", "ยังไม่ได้บันทึกมัดเลย", "warning");

      Swal.fire({
        title: 'ยืนยันจบม้วน?',
        text: `รวมผลิตได้ ${bundles.length} มัด`,
        icon: 'question',
        showCancelButton: true
      }).then(res => {
        if(res.isConfirmed) {
          document.getElementById('loading').style.display = 'flex';
          // ส่งข้อมูลไปบันทึก
          google.script.run.withSuccessHandler(() => {
            Swal.fire("เรียบร้อย", "บันทึกข้อมูลและอัปเดตสต็อกแล้ว", "success")
              .then(() => location.reload());
          }).processTubeProduction(slitInfo.id, bundles);
        }
      });
    }
  </script>
</body>
</html>
